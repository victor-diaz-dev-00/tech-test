spring.application.name=GFT Technical Test

# H2 datasource
spring.datasource.url=jdbc:h2:mem:pricesdb;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true
logging.level.liquibase=DEBUG
logging.level.org.liquibase=DEBUG

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAPI/Swagger configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=false

# Application info
info.app.name=GFT Technical Test - Price Service API
info.app.description=API REST para consultar precios aplicables de productos
info.app.version=1.0.0
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
info.architecture=Hexagonal Architecture (Ports & Adapters)
info.author=Candidate
info.contact.email=candidate@example.com

# Application switches
feature.query-mode=java-filter
